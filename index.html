<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRemove Batch Background Remover</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- JSZip for bulk ZIP downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5812524294035974" crossorigin="anonymous"></script>
    
    <style>
        .bg-checkerboard {
            background-color: #f0f0f0;
            background-image:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .ad-container {
            width: 100%; text-align: center; overflow: hidden; display: flex; justify-content: center; align-items: center; 
            background-color: #f9fafb; border: 1px dashed #d1d5db; border-radius: 0.5rem; position: relative;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-12 min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="font-bold text-xl tracking-tight text-blue-600">AutoRemove Batch</h1>
            <span class="text-xs font-semibold bg-gray-100 text-gray-600 px-2 py-1 rounded-full uppercase tracking-wider">
                100% Client-Side
            </span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 py-8">
        
        <!-- Ad Banner 1 (Slot: 3561821198) -->
        <div class="mb-8 ad-container min-h-[100px]">
            <span class="text-gray-400 text-sm absolute z-0 pointer-events-none">Advertisement Slot</span>
            <ins class="adsbygoogle z-10 w-full"
                 style="display:block"
                 data-ad-client="ca-pub-5812524294035974"
                 data-ad-slot="3561821198"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <!-- Initial Upload Area -->
        <div id="upload-container" class="border-2 border-dashed border-gray-300 rounded-3xl p-16 flex flex-col items-center justify-center bg-white cursor-pointer hover:bg-gray-50 transition-colors shadow-sm">
            <h2 class="text-xl font-semibold mb-2">Upload images in bulk</h2>
            <p class="text-gray-500 text-center mb-6 max-w-sm">
                Drag and drop multiple images here, or click to browse. We'll automatically remove backgrounds locally.
            </p>
            <button class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-full transition-colors">Select Images</button>
            <input type="file" multiple accept="image/*" id="file-input" class="hidden">
        </div>

        <!-- Working Area -->
        <div id="workspace" class="hidden space-y-6">
            <!-- Controls Toolbar -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-6 items-start md:items-center justify-between">
                <div class="flex flex-col md:flex-row gap-6 w-full md:w-auto flex-1">
                    
                    <!-- Tolerance Control -->
                    <div class="flex-1 max-w-xs">
                        <div class="flex justify-between mb-1.5">
                            <label class="font-medium text-sm text-gray-700">Tolerance</label>
                            <span id="tolerance-val" class="text-sm border-gray-200 border bg-gray-50 px-1 rounded text-gray-600">10%</span>
                        </div>
                        <input type="range" id="tolerance-slider" min="0" max="100" value="10" class="w-full accent-blue-600 h-2 bg-gray-200 rounded-lg cursor-pointer">
                    </div>
                    
                    <!-- Feathering Control -->
                    <div class="flex-1 max-w-xs">
                        <div class="flex justify-between mb-1.5">
                            <label class="font-medium text-sm text-gray-700">Feathering</label>
                            <span id="feather-val" class="text-sm border-gray-200 border bg-gray-50 px-1 rounded text-gray-600">2px</span>
                        </div>
                        <input type="range" id="feather-slider" min="0" max="10" value="2" class="w-full h-2 bg-gray-200 rounded-lg cursor-pointer accent-blue-600">
                    </div>

                </div>

                <!-- Action Buttons -->
                <div class="flex items-center gap-3 w-full md:w-auto border-t md:border-t-0 pt-4 md:pt-0 border-gray-100">
                    <button id="clear-btn" class="px-4 py-2 font-medium text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-transparent hover:border-red-100">Clear All</button>
                    <button id="download-zip-btn" class="bg-gray-900 hover:bg-gray-800 disabled:opacity-50 text-white font-medium px-5 py-2.5 rounded-lg flex items-center gap-2 transition-colors shadow-sm">Zip & Download</button>
                </div>
            </div>

            <!-- Image Grid -->
            <div id="image-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-5">
                <!-- Javascript will inject images here -->
                
                <!-- Add More Card -->
                <label id="add-more-card" class="border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center text-gray-400 hover:text-blue-500 hover:border-blue-300 hover:bg-blue-50 transition-colors cursor-pointer aspect-square bg-gray-50/50 min-h-[160px]">
                    <span class="text-xs font-semibold">+ Add More</span>
                    <input type="file" multiple accept="image/*" id="add-more-input" class="hidden">
                </label>
            </div>
        </div>
        
        <!-- Ad Banner 2 (Slot: 1187710073) -->
        <div class="mt-12 ad-container min-h-[250px]">
            <span class="text-gray-400 text-sm absolute z-0 pointer-events-none">Advertisement Slot</span>
            <ins class="adsbygoogle z-10 w-full"
                 style="display:block"
                 data-ad-client="ca-pub-5812524294035974"
                 data-ad-slot="1187710073"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

    </main>

    <script>
        // Application State
        let images = [];
        let tolerance = 10;
        let feather = 2;
        let isProcessingQueue = false;

        // DOM Elements
        const uploadContainer = document.getElementById('upload-container');
        const workspace = document.getElementById('workspace');
        const fileInput = document.getElementById('file-input');
        const addMoreInput = document.getElementById('add-more-input');
        const imageGrid = document.getElementById('image-grid');
        const addMoreCard = document.getElementById('add-more-card');
        
        const toleranceSlider = document.getElementById('tolerance-slider');
        const featherSlider = document.getElementById('feather-slider');
        const toleranceVal = document.getElementById('tolerance-val');
        const featherVal = document.getElementById('feather-val');
        
        const clearBtn = document.getElementById('clear-btn');
        const downloadZipBtn = document.getElementById('download-zip-btn');

        // Drag and Drop Listeners
        uploadContainer.addEventListener('click', () => fileInput.click());
        uploadContainer.addEventListener('dragover', (e) => e.preventDefault());
        uploadContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files) handleFiles(e.dataTransfer.files);
        });
        
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        addMoreInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // Slider Listeners with simple debounce
        let debounceTimer;
        toleranceSlider.addEventListener('input', (e) => {
            tolerance = parseInt(e.target.value);
            toleranceVal.textContent = tolerance + '%';
            queueReprocessing();
        });

        featherSlider.addEventListener('input', (e) => {
            feather = parseInt(e.target.value);
            featherVal.textContent = feather + 'px';
            queueReprocessing();
        });

        // Button Listeners
        clearBtn.addEventListener('click', () => {
            images = [];
            renderGrid();
            updateUI();
        });

        downloadZipBtn.addEventListener('click', downloadZip);

        // Core Functions
        function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            if (newFiles.length === 0) return;

            newFiles.forEach(file => {
                images.push({
                    id: crypto.randomUUID(),
                    file: file,
                    originalUrl: URL.createObjectURL(file), // blob url
                    processedUrl: null, // finished base64
                    status: 'pending', // pending, processing, done, error
                    seedPoint: null // targeted pixel coordinate override
                });
            });

            updateUI();
            renderGrid();
            processQueue();
        }

        function updateUI() {
            if (images.length === 0) {
                uploadContainer.classList.remove('hidden');
                workspace.classList.add('hidden');
            } else {
                uploadContainer.classList.add('hidden');
                workspace.classList.remove('hidden');
            }

            const doneCount = images.filter(i => i.status === 'done').length;
            const pendingCount = images.filter(i => i.status === 'pending' || i.status === 'processing').length;

            if (doneCount > 0 && pendingCount === 0) {
                downloadZipBtn.disabled = false;
                downloadZipBtn.innerHTML = `Zip & Download (${doneCount})`;
            } else {
                downloadZipBtn.disabled = true;
                downloadZipBtn.innerHTML = pendingCount > 0 ? `Processing...` : `Zip & Download`;
            }
        }

        function renderGrid() {
            // Remove old cards (protect the "add more" button)
            const cards = imageGrid.querySelectorAll('.image-card');
            cards.forEach(c => c.remove());

            images.forEach(img => {
                const card = document.createElement('div');
                card.className = "image-card bg-white p-3 rounded-2xl border border-gray-200 shadow-sm flex flex-col relative group";
                
                let contentHTML = '';
                if (img.processedUrl) {
                    contentHTML = `<img src="${img.processedUrl}" class="w-full h-full object-contain pointer-events-none">`;
                } else if (img.status === 'error') {
                    contentHTML = `<div class="text-red-500 text-xs text-center font-bold">Failed</div>`;
                } else {
                    contentHTML = `<div class="text-blue-500 text-xs text-center font-bold animate-pulse">Processing...</div>`;
                }

                card.innerHTML = `
                    <button class="absolute -top-2 -right-2 bg-white border border-gray-200 text-gray-500 hover:text-red-500 hover:border-red-200 rounded-full w-6 h-6 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all z-10 shadow-sm leading-none" onclick="removeImg('${img.id}')">&times;</button>
                    
                    <div class="aspect-square relative rounded-xl overflow-hidden bg-checkerboard mb-2 shadow-inner group/target">
                        <div class="w-full h-full flex flex-col items-center justify-center absolute inset-0 z-0">${contentHTML}</div>
                        
                        <img src="${img.originalUrl}" class="original-target absolute inset-0 w-full h-full object-contain cursor-crosshair transition-opacity ${img.processedUrl ? 'opacity-0 group-hover/target:opacity-100' : 'opacity-100'} z-10" title="Click to target a specific background color">
                        
                        ${img.seedPoint ? `<div class="absolute top-1 left-1 bg-gray-900 border border-white text-white text-[9px] px-1 rounded z-20 pointer-events-none">Targeted Color</div>` : ''}
                    </div>

                    <div class="flex items-center justify-between px-1 mt-auto">
                        <p class="text-xs text-gray-500 truncate font-medium max-w-[70%]" title="${img.file.name}">${img.file.name}</p>
                        ${img.processedUrl ? `<button class="text-blue-600 hover:text-blue-800 text-[10px] font-bold px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 transition-colors uppercase" onclick="downloadSingle('${img.id}')">Save</button>` : ''}
                    </div>
                `;

                // Handle picking a custom point over the image
                const targetImg = card.querySelector('.original-target');
                targetImg.addEventListener('click', (e) => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;
                    const y = (e.clientY - rect.top) / rect.height;
                    
                    const reference = images.find(i => i.id === img.id);
                    if(reference) {
                        reference.seedPoint = {x, y};
                        reference.status = 'pending';
                        renderGrid();
                        updateUI();
                        processQueue();
                    }
                });

                imageGrid.insertBefore(card, addMoreCard);
            });
        }

        window.removeImg = function(id) {
            images = images.filter(img => img.id !== id);
            renderGrid();
            updateUI();
        }

        window.downloadSingle = function(id) {
            const img = images.find(i => i.id === id);
            if(img && img.processedUrl) {
                const a = document.createElement("a");
                a.href = img.processedUrl;
                a.download = img.file.name.replace(/\.[^/.]+$/, "") + `-nobg.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        function queueReprocessing() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                images.forEach(img => {
                    if (img.status !== 'processing') {
                        img.status = 'pending';
                    }
                });
                renderGrid();
                updateUI();
                processQueue();
            }, 300);
        }

        // Flood Fill / Process logic Loop
        async function processQueue() {
            if (isProcessingQueue) return;
            
            const nextIdx = images.findIndex(img => img.status === 'pending');
            if (nextIdx === -1) return;

            isProcessingQueue = true;
            const img = images[nextIdx];
            img.status = 'processing';
            renderGrid();
            updateUI();
            
            // Allow browser an instant to render the "processing" state
            await new Promise(r => setTimeout(r, 10));

            try {
                img.processedUrl = await doBackgroundRemovalLocal(img.originalUrl, tolerance, feather, img.seedPoint);
                img.status = 'done';
            } catch (err) {
                console.error(err);
                img.status = 'error';
            } finally {
                isProcessingQueue = false;
                renderGrid();
                updateUI();
                processQueue(); 
            }
        }

        async function downloadZip() {
            const zip = new JSZip();
            let addedFiles = 0;

            images.forEach((img) => {
                if (img.status === 'done' && img.processedUrl) {
                    addedFiles++;
                    const base64Data = img.processedUrl.split(',')[1];
                    const fileName = img.file.name.replace(/\.[^/.]+$/, "") + `-nobg.png`;
                    zip.file(fileName, base64Data, { base64: true });
                }
            });

            if (addedFiles === 0) return;

            const content = await zip.generateAsync({ type: "blob" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "bg-removed-images.zip";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Vanilla Background Flood Fill Algorithm 
        function doBackgroundRemovalLocal(imgUrl, tolerancePercent, featherAmount, seedPoint) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                
                img.onload = () => {
                    const cvs = document.createElement("canvas");
                    let w = img.width;
                    let h = img.height;

                    // Cap maximum dimension to prevent browser crashes on local memory
                    const MAX_RES = 1600;
                    if (w > MAX_RES) {
                        h = Math.floor(h * (MAX_RES / w));
                        w = MAX_RES;
                    }
                    cvs.width = w;
                    cvs.height = h;

                    const ctx = cvs.getContext("2d", { willReadFrequently: true });
                    if (!ctx) return reject(new Error("Unable to create canvas context"));

                    ctx.drawImage(img, 0, 0, w, h);
                    const imgData = ctx.getImageData(0, 0, w, h);
                    const data = imgData.data;

                    const mappedTol = (tolerancePercent / 100) * 442;
                    const tolSq = mappedTol * mappedTol;

                    const queue = new Int32Array(w * h);
                    const visited = new Uint8Array(w * h);
                    let head = 0;
                    let tail = 0;

                    let tR = 0, tG = 0, tB = 0;

                    if (seedPoint) {
                        const seedX = Math.min(w - 1, Math.max(0, Math.floor(seedPoint.x * w)));
                        const seedY = Math.min(h - 1, Math.max(0, Math.floor(seedPoint.y * h)));
                        const seedIdx = seedY * w + seedX;
                        tR = data[seedIdx * 4];
                        tG = data[seedIdx * 4 + 1];
                        tB = data[seedIdx * 4 + 2];
                        queue[tail++] = seedIdx;
                        visited[seedIdx] = 1;
                    } else {
                        // Standard auto edge grabbing
                        tR = data[0]; tG = data[1]; tB = data[2];
                        for (let x = 0; x < w; x++) {
                            queue[tail++] = x;
                            queue[tail++] = (h - 1) * w + x;
                        }
                        for (let y = 1; y < h - 1; y++) {
                            queue[tail++] = y * w;
                            queue[tail++] = y * w + w - 1;
                        }
                        for (let i = 0; i < tail; i++) {
                            visited[queue[i]] = 1;
                        }
                    }

                    // Flood fill
                    while (head < tail) {
                        const idx = queue[head++];
                        const pIdx = idx * 4;

                        const r = data[pIdx];
                        const g = data[pIdx + 1];
                        const b = data[pIdx + 2];

                        const distSq = (r - tR) * (r - tR) + (g - tG) * (g - tG) + (b - tB) * (b - tB);

                        if (distSq <= tolSq) {
                            data[pIdx + 3] = 0; // Alpha 0
                            const x = idx % w;
                            const y = Math.floor(idx / w);
                            
                            if (x > 0 && !visited[idx - 1]) { visited[idx - 1] = 1; queue[tail++] = idx - 1; }
                            if (x < w - 1 && !visited[idx + 1]) { visited[idx + 1] = 1; queue[tail++] = idx + 1; }
                            if (y > 0 && !visited[idx - w]) { visited[idx - w] = 1; queue[tail++] = idx - w; }
                            if (y < h - 1 && !visited[idx + w]) { visited[idx + w] = 1; queue[tail++] = idx + w; }
                        }
                    }

                    // Quick Box blur for alpha feathering
                    if (featherAmount > 0) {
                        for (let f = 0; f < featherAmount; f++) {
                            const outAlpha = new Uint8Array(w * h);
                            for (let y = 0; y < h; y++) {
                                for (let x = 0; x < w; x++) {
                                    const idx = (y * w + x) * 4;
                                    if (y === 0 || x === 0 || y === h - 1 || x === w - 1) {
                                        outAlpha[y * w + x] = data[idx + 3];
                                        continue;
                                    }
                                    let sum = 0;
                                    sum += data[idx - 4 + 3];
                                    sum += data[idx + 4 + 3];
                                    sum += data[idx - w * 4 + 3];
                                    sum += data[idx + w * 4 + 3];
                                    sum += data[idx + 3] * 4;
                                    outAlpha[y * w + x] = sum / 8;
                                }
                            }
                            for (let i = 0; i < w * h; i++) {
                                data[i * 4 + 3] = outAlpha[i];
                            }
                        }
                    }

                    ctx.putImageData(imgData, 0, 0);
                    resolve(cvs.toDataURL("image/png"));
                };
                
                img.onerror = () => reject(new Error("Image Load Error"));
                img.src = imgUrl;
            });
        }
    </script>
</body>
</html>
